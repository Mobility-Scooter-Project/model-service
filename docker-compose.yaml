services:
  nginx:
    image: nginx:alpine
    ports:
    - 8000:8000
    volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
    - whisperx
    - yolo
  whisperx:
    build:
      context: .
      args:
        MODEL_NAME: whisperx
    environment:
    - MODEL_NAME=whisperx
    - HF_TOKEN=${HF_TOKEN}
    - WHISPERX_SIZE=base
    - COMPUTE_TYPE=int8
  yolo:
    build:
      context: .
      args:
        MODEL_NAME: yolo
    environment:
    - MODEL_NAME=yolo

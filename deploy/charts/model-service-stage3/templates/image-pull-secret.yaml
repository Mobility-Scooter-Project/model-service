{{- if .Values.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "model-service-stage3.imagePullSecretName" . }}
  namespace: {{ include "model-service-stage3.namespace" . }}
  labels:
    {{- include "model-service-stage3.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  # Supply raw Docker config JSON from an untracked local values file.
  .dockerconfigjson: {{ required "imagePullSecret.dockerconfigjson is required when imagePullSecret.create=true" .Values.imagePullSecret.dockerconfigjson | quote }}
{{- end }}

apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    providers:
      kubernetesIngress:
        # The Stage 3 ingress points to a namespace-local ExternalName Service
        # that aliases the KEDA interceptor in the `keda` namespace.
        allowExternalNameServices: true

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  # Use the chart name as the Helm release name so the interceptor Service name
  # lines up with the documented `keda-add-ons-http-interceptor-proxy`.
  name: keda-add-ons-http
  namespace: kube-system
spec:
  repo: https://kedacore.github.io/charts
  chart: keda-add-ons-http
  version: 0.12.0
  targetNamespace: keda
  createNamespace: true
  valuesContent: |-
    images:
      tag: 0.12.0
    operator:
      watchNamespace: ""
    scaler:
      replicas: 1
    interceptor:
      replicas:
        min: 1
        max: 3
        # Hold synchronous CPU-bound requests long enough for cold starts and
        # slower inference without returning a premature timeout.
        waitTimeout: 125s
      # Keep the interceptor-to-app upstream timeout aligned with the public
      # Traefik timeout budget.
      responseHeaderTimeout: 125s
      tcpConnectTimeout: 5s
      keepAlive: 30s
      idleConnTimeout: 130s
      maxIdleConns: 256
      maxIdleConnsPerHost: 32

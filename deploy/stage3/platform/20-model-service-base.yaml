apiVersion: v1
kind: Namespace
metadata:
  name: model-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-service-runtime
  namespace: model-service
# Create the `ghcr-pull-secret` in this namespace before deploying workloads.
imagePullSecrets:
  - name: ghcr-pull-secret
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: keda-http-interceptor-timeouts
  namespace: model-service
spec:
  forwardingTimeouts:
    dialTimeout: 5s
    responseHeaderTimeout: 125s
    idleConnTimeout: 130s
  maxIdleConnsPerHost: 32
---
apiVersion: v1
kind: Service
metadata:
  name: keda-http-interceptor
  namespace: model-service
  annotations:
    # Preserve the original public Host header so the KEDA interceptor can match
    # the request to the correct HTTPScaledObject.
    traefik.ingress.kubernetes.io/service.passhostheader: "true"
    # Stretch Traefik's backend timeout so synchronous CPU inference can exceed
    # the shorter defaults without returning a 504.
    traefik.ingress.kubernetes.io/service.serverstransport: model-service-keda-http-interceptor-timeouts@kubernetescrd
spec:
  type: ExternalName
  externalName: keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local
  ports:
    - name: http
      port: 8080
      targetPort: 8080
